name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release metadata
        id: meta
        shell: bash
        run: |
          DATE="$(date -u +'%Y-%m-%d')"
          TIME="$(date -u +'%H%M%S')"
          PRETTY_TIME="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="auto-release-${DATE}-${TIME}-${SHORT_SHA}"

          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "time=$TIME" >> "$GITHUB_OUTPUT"
          echo "pretty_time=$PRETTY_TIME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Get commit info
        id: commit
        shell: bash
        run: |
          MSG="$(git log -1 --pretty=%B)"
          AUTHOR="$(git log -1 --pretty='%an <%ae>')"
          CHANGED="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" | sed 's/^/- /')"

          {
            echo "message<<EOF"
            echo "$MSG"
            echo "EOF"
            echo "author<<EOF"
            echo "$AUTHOR"
            echo "EOF"
            echo "changed<<EOF"
            if [ -z "$CHANGED" ]; then
              echo "- No changed files detected"
            else
              echo "$CHANGED"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create git tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Auto Release - ${{ steps.meta.outputs.pretty_time }}
          body: |
            ## Auto Release

            **Repository:** evanbackup1256-ship-it/kick  
            **Branch:** main  
            **Commit:** `${{ github.sha }}`  
            **Short SHA:** `${{ steps.meta.outputs.short_sha }}`  
            **Author:** ${{ steps.commit.outputs.author }}  
            **Created:** ${{ steps.meta.outputs.pretty_time }}

            ## Commit Message

            ${{ steps.commit.outputs.message }}

            ## Changed Files

            ${{ steps.commit.outputs.changed }}

            ---
            Auto-generated by GitHub Actions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
