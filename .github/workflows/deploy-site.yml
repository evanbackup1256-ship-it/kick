name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "relay/site/**"
      - "cfg/site.json"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: relay/site/package-lock.json

      - name: Build Next.js site (GitHub Pages mirror)
        working-directory: relay/site
        env:
          NEXT_PUBLIC_BASE_PATH: /kick
        run: |
          npm install
          npm run build
          npm run typecheck

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: relay/site/out
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy site from ${{ github.sha }}"
