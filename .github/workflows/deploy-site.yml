name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "relay/site/**"
      - "cfg/site.json"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: relay/site/package-lock.json

      - name: Build site bundle
        working-directory: relay/site
        run: |
          npm ci
          npm run build
          npm run typecheck

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: relay/site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy site from ${{ github.sha }}"
