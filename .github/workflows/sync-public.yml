# Syncs loader files from private repo to public repo with incremental updates.
# Clones the public repo to preserve .git (faster pushes, maintains history).
# Only obfuscates files that actually changed (content-hash based caching).

name: Sync public loader repo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  SYNC_PAT: ${{ secrets.SYNC_PAT }}
  PUBLIC_REPO: evanbackup1256-ship-it/-kick-loader

jobs:
  sync:
    runs-on: ubuntu-24.04
    if: github.repository == 'evanbackup1256-ship-it/kick'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Clone public repo (preserve .git for fast incremental push)
        if: env.SYNC_PAT != ''
        run: |
          rm -rf public_repo
          git clone --depth 1 --single-branch --branch main \
            "https://x-access-token:${{ env.SYNC_PAT }}@github.com/${{ env.PUBLIC_REPO }}.git" \
            public_repo 2>/dev/null || {
            echo "Clone failed, initializing fresh repo"
            mkdir -p public_repo
            cd public_repo && git init && git checkout -b main
          }

      - name: Detect changed source files
        id: changed
        if: env.SYNC_PAT != ''
        run: |
          mkdir -p public_repo/hub public_repo/ui/rayfield public_repo/games public_repo/games/data

          # Build list of all source paths to sync
          SOURCES=(
            "loader.luau"
            "bootstrap.luau"
            "cfg/release.json"
            "cfg/site.json"
            "cfg/access.json"
            "cfg/security.json"
            "cfg/telemetry.json"
            "cfg/weao.json"
            "cfg/scripts_manifest.json"
          )

          # Add hub files
          for f in hub/*.luau; do
            [ -f "$f" ] && SOURCES+=("$f")
          done

          # Add UI files
          [ -f ui/rayfield/source.luau ] && SOURCES+=("ui/rayfield/source.luau")

          # Add game files
          for f in games/*.luau; do
            [ -f "$f" ] && SOURCES+=("$f")
          done
          for f in games/data/*.luau; do
            [ -f "$f" ] && SOURCES+=("$f")
          done

          # Stamp public release metadata with the commit that triggered this sync.
          # Local release files are committed before the final SHA exists, so the
          # public loader repo must be corrected here to avoid one-release-behind pins.
          export RELEASE_COMMIT="${GITHUB_SHA::7}"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          commit = os.environ["RELEASE_COMMIT"]
          release_path = Path("cfg/release.json")
          loader_path = Path("loader.luau")

          release = json.loads(release_path.read_text(encoding="utf-8"))
          release["commit"] = commit
          release_path.write_text(json.dumps(release, indent=2) + "\n", encoding="utf-8")

          loader = loader_path.read_text(encoding="utf-8")
          loader = __import__("re").sub(
              r'(?m)^\tcommit = "[^"]+"',
              f'\tcommit = "{commit}"',
              loader,
              count=1,
          )
          loader_path.write_text(loader, encoding="utf-8")
          PY

          # Compare source vs public repo via sha256
          # Obfuscation targets: games/*.luau
          # Plain copy: loader.luau, bootstrap.luau, hub/*.luau, ui/rayfield/source.luau, cfg/*
          CHANGED=""
          PLAIN=""
          OBFUSCATE=""

          for src in "${SOURCES[@]}"; do
            if [ ! -f "$src" ]; then continue; fi
            src_hash=$(sha256sum "$src" | cut -d' ' -f1)
            dst_hash=""
            if [ -f "public_repo/$src" ]; then
              dst_hash=$(sha256sum "public_repo/$src" | cut -d' ' -f1)
            fi
            if [ "$src_hash" != "$dst_hash" ]; then
              mkdir -p "public_repo/$(dirname "$src")"
              cp "$src" "public_repo/$src"
              # Determine if file needs obfuscation
              case "$src" in
                games/*.luau)
                  OBFUSCATE="$OBFUSCATE public_repo/$src" ;;
                *)
                  PLAIN="$PLAIN $src" ;;
              esac
              CHANGED="$CHANGED $src"
            fi
          done

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "plain=$PLAIN" >> "$GITHUB_OUTPUT"
          echo "obfuscate=$OBFUSCATE" >> "$GITHUB_OUTPUT"
          echo "count=$(echo $CHANGED | wc -w)" >> "$GITHUB_OUTPUT"

          if [ -n "$CHANGED" ]; then
            echo "Changed files ($(echo $CHANGED | wc -w)): $CHANGED"
          else
            echo "No source changes detected — skipping sync"
          fi

      - name: Obfuscate changed scripts
        if: env.SYNC_PAT != '' && steps.changed.outputs.obfuscate != ''
        run: |
          echo "Obfuscating: ${{ steps.changed.outputs.obfuscate }}"
          bash maint/obfuscate_scripts.sh ${{ steps.changed.outputs.obfuscate }}

      - name: Commit and push to public repo
        if: env.SYNC_PAT != '' && steps.changed.outputs.count != '0'
        run: |
          set -e
          cd public_repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git rev-parse --verify main >/dev/null 2>&1; then
            git checkout -b main
          fi

          git add -A
          git commit -m "Sync ${{ steps.changed.outputs.count }} file(s) from ${{ github.repository }}@${{ github.sha }}" || true

          # Retry push up to 3 times with exponential backoff
          for i in 1 2 3; do
            if git push origin main 2>&1; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              sleep $((i * 5))
              git pull --rebase origin main 2>/dev/null || true
            fi
          done
          echo "Push failed after 3 attempts"
          exit 1
