# Syncs loader files from this private repo to a public repo
# so players can still fetch loader.luau / bootstrap.luau etc.
#
# Setup:
#   1. Create a new public repo: evanbackup1256-ship-it/kick-loader
#   2. Generate a classic PAT with "repo" scope
#   3. Add it as a secret: SYNC_PAT
#   4. Update REPO in bootstrap.luau / loader.luau to "evanbackup1256-ship-it/kick-loader"
#   5. Push to main on this repo

name: Sync public loader repo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  SYNC_PAT: ${{ secrets.SYNC_PAT }}

jobs:
  sync:
    runs-on: ubuntu-24.04
    if: github.repository == 'evanbackup1256-ship-it/kick'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build public bundle
        shell: bash
        run: |
          rm -rf public_repo
          mkdir -p public_repo
          mkdir -p public_repo/hub
          mkdir -p public_repo/ui/onyx
          mkdir -p public_repo/ui/iris
          mkdir -p public_repo/ui/flexui
          mkdir -p public_repo/games/data

          cp loader.luau bootstrap.luau public_repo/
          cp cfg/release.json cfg/site.json cfg/access.json cfg/security.json cfg/telemetry.json cfg/weao.json cfg/scripts_manifest.json public_repo/
          cp hub/*.luau public_repo/hub/
          cp ui/onyx/source.luau public_repo/ui/onyx/ 2>/dev/null || true
          cp ui/iris/source.luau public_repo/ui/iris/ 2>/dev/null || true
          cp ui/flexui/source.luau public_repo/ui/flexui/ 2>/dev/null || true
          cp games/*.luau public_repo/games/ 2>/dev/null || true
          cp games/data/*.luau public_repo/games/data/ 2>/dev/null || true

      - name: Obfuscate scripts for public release
        if: env.SYNC_PAT != ''
        shell: bash
        run: |
          bash maint/strip_comments.sh public_repo/hub/*.luau public_repo/games/*.luau public_repo/ui/*/source.luau 2>/dev/null || true
          bash maint/obfuscate_scripts.sh public_repo/hub/*.luau public_repo/games/*.luau public_repo/ui/*/source.luau 2>/dev/null || true
          bash maint/strip_comments.sh public_repo/*.luau 2>/dev/null || true

      - name: Push to public repo
        if: env.SYNC_PAT != ''
        shell: bash
        run: |
          set -e
          cd public_repo
          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --allow-empty -m "Sync from ${{ github.repository }}@${{ github.sha }}"
          git remote add origin https://x-access-token:${{ env.SYNC_PAT }}@github.com/evanbackup1256-ship-it/-kick-loader.git
          git push -f origin main 2>&1
