name: Verify repo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
        with:
          # On pull_request the default checkout is a synthetic merge commit
          # whose HEAD/HEAD~1 can't satisfy the release-commit invariant, so
          # check out the PR head (empty -> pushed commit on push events).
          # fetch-depth 2 keeps HEAD~1 available for the hash-bump check.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Version and deploy copy checks
        shell: pwsh
        run: ./maint/verify_versions.ps1

      - name: UI compatibility checks
        shell: pwsh
        run: ./maint/verify_ui_compat.ps1
