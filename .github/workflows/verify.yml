name: Verify repo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - name: Version and deploy copy checks
        shell: pwsh
        run: ./maint/verify_versions.ps1
